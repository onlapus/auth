<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/auth.css">
    <link rel="stylesheet" href="styles/modals.css">
    <title>Reset Password | Auth Microservice</title>
</head>
<body>
    <div class="auth-container">
        <section class="form-side">
            <div class="form-header">
                <h1>Reset Password</h1>
                <p>Enter your new password below.</p>
            </div>

            <form action="#" id="reset-form">
                <div class="input-group">
                    <label for="new-password">New Password</label>
                    <input type="password" id="new-password" placeholder="••••••••" required>
                </div>
                <div class="input-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="••••••••" required>
                    <small id="password-hint" style="color: var(--text-secondary); margin-top: 0.3rem; font-size: 0.85rem;"></small>
                </div>
                <button type="submit" class="submit-btn">Reset Password</button>
            </form>

            <div class="switch-auth">
                Remember your password? <a href="login">Sign in instead</a>
            </div>
        </section>

        <section class="visual-side">
            <div class="logo-container">
                <div onclick="window.location.replace('./');" class="logo-placeholder">A</div>
                <h2 style="margin-top: 20px; letter-spacing: 2px;">AUTH SERVICE</h2>
            </div>
        </section>
    </div>

    <div id="alert-modal" class="modal">
        <div class="modal-content profile-card" style="max-width: 400px; text-align: center;">
            <h3 id="alert-title" style="margin-top: 0;">Notification</h3>
            <p id="alert-message" style="color: var(--text-secondary);"></p>
            <button id="alert-ok" class="session-btn" style="margin-top: 1rem;">OK</button>
        </div>
    </div>

    <script src="scripts/auth_api.js"></script>
    <script src="scripts/password_reset.js"></script>
</body>
</html>
