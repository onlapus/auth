<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/auth.css">
    <link rel="stylesheet" href="styles/modals.css">
    <title>Login | Auth Microservice</title>
</head>
<body>
    <div class="auth-container">
        <section class="form-side">
            <div class="form-header">
                <h1>Welcome Back</h1>
                <p>Please enter your details to sign in.</p>
            </div>

            <form action="#">
                <div class="input-group">
                    <label for="id">Username or Email</label>
                    <input type="text" id="id" placeholder="username@example.com" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="submit-btn">Sign In</button>
                <div style="text-align: center; margin-top: 0.5rem;">
                    <a href="#" id="forgot-password-link" style="color: var(--accent-primary); text-decoration: none; font-size: 0.9rem;">Forgot password?</a>
                </div>
            </form>

            <div class="divider">OR</div>

            <div class="social-btns">
                <button class="social-btn" id="google-btn">Google</button>
                <button class="social-btn" id="facebook-btn">Facebook</button>
            </div>

            <div class="switch-auth">
                Don't have an account? <a href="register">Sign up</a>
            </div>
        </section>

        <section class="visual-side">
            <div class="logo-container">
                <div onclick="window.location.replace('./');" class="logo-placeholder">A</div>
                <h2 style="margin-top: 20px; letter-spacing: 2px;">AUTH SERVICE</h2>
            </div>
        </section>

    <div id="alert-modal" class="modal">
        <div class="modal-content profile-card" style="max-width: 400px; text-align: center;">
            <h3 id="alert-title" style="margin-top: 0;">Notification</h3>
            <p id="alert-message" style="color: var(--text-secondary);"></p>
            <button id="alert-ok" class="session-btn" style="margin-top: 1rem;">OK</button>
        </div>
    </div>

    <div id="password-modal" class="modal">
        <div class="modal-content profile-card" style="max-width: 450px;">
            <h3>Confirm Action</h3>
            <p style="color: var(--text-secondary); font-size: 0.9rem;">Please enter your password to proceed.</p>
            <input type="password" id="modal-password-input" class="session-btn" 
                   style="background: var(--bg-tertiary); text-align: left; cursor: text; width: 100%; margin: 1rem 0; border: 1px solid var(--bg-hover);" 
                   placeholder="Your password">
            <div style="display: flex; gap: 1rem;">
                <button id="password-cancel" class="session-btn" style="background: var(--bg-tertiary); flex: 1;">Cancel</button>
                <button id="password-confirm" class="session-btn" style="flex: 1;">Confirm</button>
            </div>
        </div>
    </div>

    <div id="reset-email-modal" class="modal">
        <div class="modal-content reset-modal-card">
            <h3 style="margin-top: 0; margin-bottom: 0.5rem;">Reset Password</h3>
            <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1.5rem;">Enter your email address and we'll send you a password reset link.</p>
            <input type="email" id="reset-email-input" class="reset-modal-input" placeholder="your@email.com">
            <div class="reset-modal-buttons">
                <button id="reset-cancel" class="reset-btn-cancel">Cancel</button>
                <button id="reset-send" class="reset-btn-primary">Send Reset Link</button>
            </div>
        </div>
    </div>
    <script src="scripts/auth_api.js"></script>
    <script src="scripts/login.js"></script>
    </div>
</body>
</html>
